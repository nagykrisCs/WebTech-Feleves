<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Autókereskedés Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vintage Autó Registry</h1>
    </header>

    <main>
        <section id="editor">
            <h2 id="form-title">Új autó rögzítése</h2>
            <form id="car-form">
                <input type="hidden" id="car-id">
                
                <div class="input-row">
                    <input type="text" id="brand" placeholder="Márka" required>
                    <input type="text" id="model" placeholder="Modell" required>
                </div>
                
                <div class="input-row">
                    <input type="number" id="year" placeholder="Gyártási év" required>
                    <input type="number" id="consumption" step="0.1" placeholder="Fogyasztás (L/100km)" required>
                </div>

                <div class="button-row">
                    <button type="submit" id="form-btn">Mentés az adatbázisba</button>
                    <button type="button" id="cancel-btn" class="hidden">Mégse / Új</button>
                </div>
            </form>
            <div id="status-message" class="status-box hidden"></div>
        </section>

        <section id="list-container">
            <h2>Aktuális készlet</h2>
            <div id="car-list" class="grid-layout">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
